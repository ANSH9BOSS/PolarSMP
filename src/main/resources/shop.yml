# ---------------------------------------------------------------
# SHOP ITEMS
# Each item has:
#   id          - Unique identifier for the item
#   material    - Bukkit material name
#   display-name - MiniMessage display name
#   lore        - List of MiniMessage lore lines
#   price       - Cost in PolarSMP coins
#   amount      - Stack size to give
#   custom-model-data - (optional) Custom model data for resource pack
# ---------------------------------------------------------------
