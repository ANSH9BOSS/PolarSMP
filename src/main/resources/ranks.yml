# ╔═══════════════════════════════════════════════════════════════╗
# ║              PolarSMP - Ranks Configuration                   ║
# ║   Defines perks, colors, and prefixes for each rank           ║
# ╚═══════════════════════════════════════════════════════════════╝

ranks:
  # ─── RANK 1 ── (Most prestigious) ─────────────────────────────
  1:
    # Display color in MiniMessage hex format
    color: "<gradient:#FFD700:#FF8C00>"
    # Prefix shown in chat and tab list (MiniMessage)
    prefix-format: "<gradient:#FFD700:#FF8C00><bold>[#1]</bold></gradient>"
    # Extra hearts (half-hearts). 10 extra hearts = +5 max HP = 30 total HP (15 hearts)
    extra-hearts: 10
    # Potion effects applied while holding this rank
    effects:
      - effect: SPEED
        amplifier: 1       # Amplifier 1 = Speed II (0-indexed)
      - effect: STRENGTH
        amplifier: 1       # Amplifier 1 = Strength II
      - effect: RESISTANCE
        amplifier: 1       # Amplifier 1 = Resistance II
      - effect: FIRE_RESISTANCE
        amplifier: 0       # Amplifier 0 = Fire Resistance I
      - effect: HASTE
        amplifier: 1       # Amplifier 1 = Haste II
    # Custom model data for resource pack rank badge (paper item)
    resource-pack-custom-model-data: 1010

  # ─── RANK 2 ──────────────────────────────────────────────────
  2:
    color: "<gradient:#E8E8E8:#C0C0C0>"
    prefix-format: "<gradient:#E8E8E8:#C0C0C0><bold>[#2]</bold></gradient>"
    extra-hearts: 8
    effects:
      - effect: SPEED
        amplifier: 1
      - effect: STRENGTH
        amplifier: 1
      - effect: RESISTANCE
        amplifier: 1
      - effect: FIRE_RESISTANCE
        amplifier: 0
    resource-pack-custom-model-data: 1011

  # ─── RANK 3 ──────────────────────────────────────────────────
