# ╔═══════════════════════════════════════════════════════════════╗
# ║              PolarSMP - Rewards Configuration                 ║
# ╚═══════════════════════════════════════════════════════════════╝

# ---------------------------------------------------------------
# REWARDS LIST
# Each reward has:
#   id               - Unique identifier
#   display-name     - MiniMessage display name shown in GUI
#   material         - GUI icon material
#   lore             - MiniMessage lore lines (description)
#   requirement-type - KILLS / COINS / STREAK / KILL_RANK_1 / HOLD_RANK / TOTAL_KILLS
#   requirement-value- Target value required to unlock
#   reward-type      - COINS / ITEM / COMMAND
#   reward-amount    - Amount for COINS reward type
#   reward-material  - Material name for ITEM reward type
#   reward-command   - Console command for COMMAND reward type (%player% = player name)
#   repeatable       - If true, can be claimed again after completing again
# ---------------------------------------------------------------
rewards:
